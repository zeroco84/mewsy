name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          # Minimum supported version (package.json engines: >=20)
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
